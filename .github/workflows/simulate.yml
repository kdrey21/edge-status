name: Daily Simulation

on:
  schedule:
    # 06:00 UTC every day
    - cron: '0 6 * * *'
  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:

jobs:
  simulate:
    name: Run Monte Carlo sim → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run simulation
        run: npx tsx scripts/simulate.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
